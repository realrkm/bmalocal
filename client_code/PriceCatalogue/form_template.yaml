components:
- components:
  - layout_properties: {grid_position: 'QIEPQD,VRIUKA'}
    name: label_title
    properties: {align: center, background: '#0056D6', bold: false, font: Mozilla Headline, font_size: 18, foreground: 'theme:White', text: Price Catalogue}
    type: Label
  - components:
    - event_bindings: {click: btn_BuyingPrice_click}
      layout_properties: {grid_position: 'UDZOJV,QQUGFZ CHKCJX,ILZXFF'}
      name: btn_BuyingPrice
      properties: {align: full, background: '#0056D6', enabled: true, font: Mozilla Headline, font_size: 14, foreground: 'theme:White', text: VIEW BUYING PRICE, visible: true}
      type: Button
    - event_bindings: {click: btn_MissingBuyingPrice_click}
      layout_properties: {grid_position: 'UDZOJV,QQUGFZ HHBJVL,GGKPKC'}
      name: btn_MissingBuyingPrice
      properties: {align: full, background: '#0056D6', font: Mozilla Headline, font_size: 14, foreground: 'theme:White', text: MISSING BUYING PRICE}
      type: Button
    - event_bindings: {click: btn_SellingPrice_click}
      layout_properties: {grid_position: 'UDZOJV,TLAIGG JENVTC,PGIGKG'}
      name: btn_SellingPrice
      properties: {align: full, background: '#0056D6', enabled: true, font: Mozilla Headline, font_size: 14, foreground: 'theme:White', text: VIEW SELLING PRICE, visible: true}
      type: Button
    - event_bindings: {click: btn_MissingSellingPrice_click}
      layout_properties: {grid_position: 'UDZOJV,TLAIGG SFQHTX,DWKVMA'}
      name: btn_MissingSellingPrice
      properties: {align: full, background: '#0056D6', font: Mozilla Headline, font_size: 14, foreground: 'theme:White', text: MISSING SELLING PRICE}
      type: Button
    - event_bindings: {click: btn_Export_click}
      layout_properties: {grid_position: 'UDZOJV,TQTFLP RBTBKM,VYKXDS'}
      name: btn_Export
      properties: {align: full, background: '#00d679', border: '', enabled: true, font: Mozilla Headline, font_size: 14, foreground: 'theme:Gray 900', text: EXPORT SELLING PRICE, visible: true}
      type: Button
    - data_bindings: []
      event_bindings: {change: file_loader_import_change}
      layout_properties: {full_width_row: true, grid_position: 'UDZOJV,TQTFLP BLSCNZ,HXVPFQ'}
      name: file_loader_import
      properties: {align: center, background: '#00d679', border: solid, enabled: true, file_types: .xlsx, font: Mozilla Headline, font_size: 14, foreground: 'theme:Black', icon: 'fa:upload', role: raised, text: IMPORT SELLING PRICES}
      type: FileLoader
    layout_properties: {grid_position: 'NWEUAS,CHNGLZ', row_background: ''}
    name: card_2
    properties:
      background: theme:White
      border: ''
      role: [wide, glass-panel]
      wrap_on: never
    type: ColumnPanel
  - layout_properties: {grid_position: 'LUCTYP,GKXCRI'}
    name: label_3
    properties: {align: center, background: 'theme:White', border: solid, font: Mozilla Headline, font_size: 16, foreground: '#dc1818', text: Ensure all parts have both buying and selling prices in order to appear in the Price Catalogue.}
    type: Label
  - event_bindings: {pressed_enter: btn_Search_click}
    layout_properties: {grid_position: 'QXTLGH,NAGFFN'}
    name: text_box_search
    properties: {background: 'theme:White', border: solid, font: Mozilla Headline, font_size: 16, foreground: 'theme:Black', placeholder: Enter Part Name / Part No *}
    type: TextBox
  - event_bindings: {click: btn_Search_click}
    layout_properties: {grid_position: 'QXTLGH,GLYMLM'}
    name: btn_Search
    properties: {align: full, background: '#0056D6', font: Mozilla Headline, font_size: 16, foreground: 'theme:White', text: SEARCH}
    type: Button
  - components:
    - layout_properties: {pinned: false}
      name: repeating_panel_1
      properties: {background: '', border: '', foreground: '', item_template: PriceCatalogue.RowTemplate9, role: null}
      type: RepeatingPanel
    layout_properties: {full_width_row: true, grid_position: 'NMRTRA,IOXZSL'}
    name: data_grid_1
    properties:
      background: theme:Black
      border: solid
      columns:
      - {data_key: 'No', expand: false, id: JKSDUP, title: 'No', width: 42}
      - {data_key: Name, expand: true, id: OJLQEN, title: Name, width: ''}
      - {data_key: PartNo, expand: true, id: GOXAZB, title: PartNo, width: ''}
      - {data_key: '', id: ZYXDYB, title: '', width: '20'}
      - {data_key: ReorderLevel, expand: false, id: HGFISP, title: Reorder Level, width: 112}
      - {data_key: Cost, expand: true, id: GYUEKP, title: Buying Price (Kshs)}
      - {data_key: Selling, expand: true, id: BUEABL, title: Selling Price (Kshs)}
      - {data_key: Discount, expand: true, id: LHIADB, title: Discounted Price (Kshs)}
      - {data_key: StockBalance, id: ZSGDYX, title: Stock Balance}
      foreground: theme:White
      role: wide
      wrap_on: mobile
    type: DataGrid
  layout_properties: {full_width_row: true, grid_position: 'AWGLFW,UVUHMI', row_background: ''}
  name: card_1
  properties: {background: 'theme:White', col_widths: '{"NAGFFN":40,"GLYMLM":20}', role: glass-panel, wrap_on: never}
  type: ColumnPanel
container:
  properties: {role: wide, wrap_on: never}
  type: ColumnPanel
is_package: true
