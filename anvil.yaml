metadata: {logo_img: 'asset:BMAAutoAccessories.ico', title: BMA Auto Accessories}
name: BMALocal
native_deps:
  head_html: |+
    <script>
        function replaceBanner(){
            var els = [].slice.apply(document.getElementsByClassName("anvil-show-banner"));
            for (var i = 0; i < els.length; i++) {
                els[i].className = els[i].className.replace(/ *\banvil-show-banner\b/g, " ");
            }
        }
    </script>
    <script>
        (function () {

            function init() {
                // ✅ Find the input ONCE (even after type changes)
                const password = document.querySelector('input.form-control[placeholder="password"]');

                if (!password || password.dataset.eyeAttached) return;

                password.dataset.eyeAttached = "true";

                // Wrap input
                const wrapper = document.createElement("div");
                wrapper.className = "password-wrapper";

                password.parentNode.insertBefore(wrapper, password);
                wrapper.appendChild(password);

                // Create toggle
                const toggle = document.createElement("div");
                toggle.className = "password-toggle";

                toggle.innerHTML = `
                <svg class="icon-visible" viewBox="0 0 24 24">
                    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>

                <svg class="icon-hidden" viewBox="0 0 24 24">
                    <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19C5 19 1 12 1 12"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
            `;

                wrapper.appendChild(toggle);

                toggle.addEventListener("click", function () {
                    const isHidden = password.type === "password";

                    password.type = isHidden ? "text" : "password";
                    toggle.classList.toggle("hidden");

                    toggle.classList.add("active-glow");
                    setTimeout(() => toggle.classList.remove("active-glow"), 300);
                });
            }

            // Run ONCE + short retry (not aggressive loop)
            let attempts = 0;
            const interval = setInterval(() => {
                init();
                attempts++;
                if (attempts > 10) clearInterval(interval);
            }, 300);

        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mozilla+Headline:wght@200..700&display=swap" rel="stylesheet">

package_name: BMALocal
runtime_options:
  client_version: '3'
  server_spec: {base: python310-standard}
  server_spec_disabled: {base: python310-minimal, requirements: ''}
  server_version: python3-sandbox
  version: 2
secrets: {}
services:
- client_config: {}
  server_config: {}
  source: /runtime/services/tables.yml
- client_config: {allow_signup: true, confirm_email: false, enable_automatically: false, mfa_timeout_days: 0, require_mfa: false, require_secure_passwords: true, use_email: true}
  server_config:
    email_content:
      reset_password:
        html: |-
          <p>Hi there,</p>
          <p>You have requested a password reset for your account {{email}}. To reset your password, click the link below:</p>
          <p>{{reset_link}}</p>
          <p>This link will expire in ten minutes.</p>
    user_table: users
  source: /runtime/services/anvil/users.yml
- client_config: {}
  server_config: {}
  source: /runtime/services/anvil/secrets.yml
startup: {module: Main, type: form}
startup_form: null
uplink_visible: true
