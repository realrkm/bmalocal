name: BMALocal
native_deps:
  head_html: "<script>\n    function replaceBanner(){\n        var els = [].slice.apply(document.getElementsByClassName(\"anvil-show-banner\"));\n        for (var i = 0; i < els.length; i++) {\n            els[i].className = els[i].className.replace(/ *\\banvil-show-banner\\b/g, \" \");\n        }\n    }\n</script>\n<script>\n    (function () {\n        if (window._bmaLiveLoaded) return;\n        window._bmaLiveLoaded = true;\n\n        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;\n        const recognition = SpeechRecognition ? new SpeechRecognition() : null;\n\n        let lockedVoice = null;\n        let isListening = false;\n        let silenceTimer = null;\n        let finalTranscript = \"\";\n\n        // ── Voice Locking (prevents language switching) ──\n        function initVoice() {\n            const loadVoices = () => {\n                const voices = speechSynthesis.getVoices();\n                // Prefer Google English, fallback to any English, then first available\n                lockedVoice = voices.find(v => v.name.includes(\"Google\") && v.lang.startsWith(\"en\")) \n                    || voices.find(v => v.lang.startsWith(\"en\")) \n                    || voices[0];\n                console.log('[BMALive] Voice locked:', lockedVoice?.name, lockedVoice?.lang);\n            };\n\n            // Handle async voice loading (Chrome)\n            if (speechSynthesis.onvoiceschanged !== undefined) {\n                speechSynthesis.onvoiceschanged = loadVoices;\n            }\n            loadVoices(); // Try sync load first\n        }\n        initVoice();\n\n        function notify(event, data) {\n            try {\n                if (window.live_assistant_event) {\n                    window.live_assistant_event(event, JSON.stringify(data));\n                }\n            } catch (e) { console.error('[BMALive]', e); }\n        }\n\n        function stopSpeaking() {\n            if (window.speechSynthesis.speaking) {\n                window.speechSynthesis.cancel();\n                notify('barge_in', {});\n            }\n        }\n\n        // ── Speech Recognition Setup ──\n        if (recognition) {\n            recognition.continuous = false;        // ✅ Single utterance only\n            recognition.interimResults = true;\n            recognition.lang = \"en-US\";\n            recognition.maxAlternatives = 1;\n\n            recognition.onstart = () => {\n                isListening = true;\n                    finalTranscript = \"\";\n                    notify(\"status\", { text: \"🎤 Listening...\" });\n                    };\n\n                    recognition.onspeechstart = () => {\n                    stopSpeaking(); // Barge-in: stop assistant if user interrupts\n                    };\n\n                    recognition.onresult = (e) => {\n                    let interim = \"\";\n                    for (let i = e.resultIndex; i < e.results.length; i++) {\n                    if (e.results[i].isFinal) {\n                    finalTranscript += e.results[i][0].transcript;\n                    } else {\n                    interim += e.results[i][0].transcript;\n                    }\n                    }\n                    if (interim) notify(\"interim\", { text: interim });\n                    };\n\n                    recognition.onend = () => {\n                    isListening = false;\n                    // ✅ DO NOT auto-restart. Wait for explicit start() from Python.\n                    if (finalTranscript.trim()) {\n                    notify(\"final\", { text: finalTranscript.trim() });\n                    finalTranscript = \"\";\n                    } else {\n                    notify(\"status\", { text: \"⚪ No speech detected\" });\n                    }\n                    };\n\n                    recognition.onerror = (e) => {\n                    isListening = false;\n                    notify(\"status\", { text: `❌ ${e.error}` });\n                    };\n                    }\n\n                    // ── Speech Synthesis: Speak FULL response once ──\n                    window.bmaSpeakFull = function (text) {\n                    if (!text?.trim()) return;\n\n                    // Ensure voice is ready\n                    if (!lockedVoice) {\n                    const voices = speechSynthesis.getVoices();\n                    lockedVoice = voices.find(v => v.name.includes(\"Google\") && v.lang.startsWith(\"en\")) \n                    || voices.find(v => v.lang.startsWith(\"en\")) \n                    || voices[0];\n                    }\n\n                    // Cancel any ongoing speech first\n                    window.speechSynthesis.cancel();\n\n                    const utter = new SpeechSynthesisUtterance(text);\n                    utter.voice = lockedVoice;\n                    utter.lang = \"en-US\";  // Force English\n                    utter.rate = 0.95;\n                    utter.pitch = 1.0;\n\n                    // Notify when done speaking\n                    utter.onend = () => {\n                    notify(\"speech_complete\", {});\n                    };\n                    utter.onerror = (e) => {\n                    console.error('[BMALive] Speech error:', e);\n                    notify(\"status\", { text: \"❌ Speech error\" });\n                    };\n\n                    speechSynthesis.speak(utter);\n                    };\n\n                    // Deprecated chunked version (keep for backward compat)\n                    window.bmaSpeakChunk = function(text) { window.bmaSpeakFull(text); };\n                    window.bmaFlushSpeech = function() { /* no-op in walkie-talkie mode */ };\n\n                    // ── Control API for Python ──\n                    window.BMALiveControl = {\n                    startListening: () => {\n                    if (!recognition) {\n                    notify(\"error\", { message: \"Speech recognition not supported\" });\n                    return false;\n                    }\n                    try {\n                    recognition.start();\n                    return true;\n                    } catch (e) {\n                    console.error('[BMALive] Start failed:', e);\n                    return false;\n                    }\n                    },\n                    stopListening: () => {\n                    if (recognition && isListening) {\n                    recognition.stop();\n                    return true;\n                    }\n                    return false;\n                    },\n                    isListening: () => isListening,\n                    cancelSpeech: () => {\n                    window.speechSynthesis.cancel();\n                    }\n                    };\n\n    })();\n</script>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Mozilla+Headline:wght@200..700&display=swap\" rel=\"stylesheet\">\n\n"
package_name: BMALocal
runtime_options:
  client_version: '3'
  server_spec: {base: python310-standard}
  server_spec_disabled: {base: python310-minimal, requirements: ''}
  server_version: python3-sandbox
  version: 2
secrets: {}
services:
- client_config: {}
  server_config: {}
  source: /runtime/services/tables.yml
- client_config: {allow_signup: true, confirm_email: false, enable_automatically: false, mfa_timeout_days: 0, require_mfa: false, require_secure_passwords: true, use_email: true}
  server_config:
    email_content:
      reset_password:
        html: |-
          <p>Hi there,</p>
          <p>You have requested a password reset for your account {{email}}. To reset your password, click the link below:</p>
          <p>{{reset_link}}</p>
          <p>This link will expire in ten minutes.</p>
    user_table: users
  source: /runtime/services/anvil/users.yml
- client_config: {}
  server_config: {}
  source: /runtime/services/anvil/secrets.yml
startup: {module: Launcher, type: form}
startup_form: null
uplink_visible: true
