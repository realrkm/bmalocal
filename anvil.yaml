metadata: {logo_img: 'asset:BMAAutoAccessories.ico', title: BMA Auto Accessories}
name: BMALocal
native_deps:
  head_html: |+
    <script>
        function replaceBanner(){
            var els = [].slice.apply(document.getElementsByClassName("anvil-show-banner"));
            for (var i = 0; i < els.length; i++) {
                els[i].className = els[i].className.replace(/ *\banvil-show-banner\b/g, " ");
            }
        }
    </script>
    <script>
        (function () {
            if (window._bmaLiveLoaded) return;
            window._bmaLiveLoaded = true;

            const SpeechRecognition =
                window.SpeechRecognition || window.webkitSpeechRecognition;

            const recognition = SpeechRecognition ? new SpeechRecognition() : null;

            let isListening = false;
            let silenceTimer = null;

            function notify(event, data) {
                try {
                    if (window.live_assistant_event) {
                        window.live_assistant_event(event, JSON.stringify(data));
                    }
                } catch (e) {
                    console.error('[BMALive]', e);
                }
            }

            function stopSpeaking() {
                if (window.speechSynthesis.speaking) {
                    window.speechSynthesis.cancel();
                    notify('barge_in', {});
                }
            }

            if (recognition) {
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = "en-US";

                recognition.onstart = () => {
                isListening = true;
                notify("status", { text: "🎤 Listening..." });
            };

                recognition.onspeechstart = () => {
                stopSpeaking(); // 🔥 BARGE-IN
            };

                recognition.onresult = (e) => {
                let interim = "";
                let finalText = "";

                for (let i = e.resultIndex; i < e.results.length; i++) {
                if (e.results[i].isFinal) {
                finalText += e.results[i][0].transcript;
            } else {
                interim += e.results[i][0].transcript;
            }
            }

                if (interim) {
                notify("interim", { text: interim });
            }

                if (finalText) {
                clearTimeout(silenceTimer);

                silenceTimer = setTimeout(() => {
                notify("final", { text: finalText });
            }, 700); // natural pause detection
            }
            };

                recognition.onend = () => {
                isListening = false;
                try { recognition.start(); } catch {}
            };

                recognition.onerror = (e) => {
                notify("status", { text: "❌ " + e.error });
                isListening = false;
            };
            }

            let speechBuffer = "";

            window.bmaSpeakChunk = function (text) {
                if (!text || !text.trim()) return;

                speechBuffer += text;

                if (speechBuffer.length > 80) {
                    const utter = new SpeechSynthesisUtterance(speechBuffer);
                    speechBuffer = "";

                    const voices = speechSynthesis.getVoices();
                    utter.voice = voices.find(v => v.name.includes("Google")) || voices[0];

                    speechSynthesis.speak(utter);
                }
            };

            window.bmaFlushSpeech = function () {
                if (speechBuffer.trim()) {
                    const utter = new SpeechSynthesisUtterance(speechBuffer);
                    speechBuffer = "";
                    speechSynthesis.speak(utter);
                }
                };

                window.GeminiLive = {
                connect: () => {
                if (!recognition) {
                notify("error", { message: "Speech not supported" });
                return;
            }
                try {
                recognition.start();
                notify("connected", {});
            } catch (e) {
                console.error(e);
            }
            },

                disconnect: () => {
                if (recognition) recognition.stop();
                window.speechSynthesis.cancel();
                notify("disconnected", {});
            }
            };
            })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mozilla+Headline:wght@200..700&display=swap" rel="stylesheet">

package_name: BMALocal
runtime_options:
  client_version: '3'
  server_spec: {base: python310-standard}
  server_spec_disabled: {base: python310-minimal, requirements: ''}
  server_version: python3-sandbox
  version: 2
secrets: {}
services:
- client_config: {}
  server_config: {}
  source: /runtime/services/tables.yml
- client_config: {allow_signup: true, confirm_email: false, enable_automatically: false, mfa_timeout_days: 0, require_mfa: false, require_secure_passwords: true, use_email: true}
  server_config:
    email_content:
      reset_password:
        html: |-
          <p>Hi there,</p>
          <p>You have requested a password reset for your account {{email}}. To reset your password, click the link below:</p>
          <p>{{reset_link}}</p>
          <p>This link will expire in ten minutes.</p>
    user_table: users
  source: /runtime/services/anvil/users.yml
- client_config: {}
  server_config: {}
  source: /runtime/services/anvil/secrets.yml
startup: {module: Launcher, type: form}
startup_form: null
uplink_visible: true
