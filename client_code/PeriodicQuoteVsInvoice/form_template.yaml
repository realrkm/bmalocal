components:
- components:
  - layout_properties: {grid_position: 'MPGOTI,LLJMFZ'}
    name: label_title
    properties: {align: center, background: '#0056D6', bold: false, font: Mozilla Headline, font_size: 16, foreground: 'theme:White', text: Periodic Quote And Invoice}
    type: Label
  - layout_properties: {grid_position: 'FLXMTG,WAAIGX'}
    name: spacer_1
    properties: {height: 20}
    type: Spacer
  - layout_properties: {grid_position: 'UDFIQU,RYRPZO'}
    name: date_picker_start
    properties: {background: 'theme:White', border: '', font: Mozilla Headline, font_size: 16, foreground: 'theme:Black', placeholder: Enter Start Date *}
    type: DatePicker
  - layout_properties: {grid_position: 'UDFIQU,EACPAO'}
    name: date_picker_end
    properties: {background: 'theme:White', border: '', font: Mozilla Headline, font_size: 16, foreground: 'theme:Black', placeholder: Enter End Date *}
    type: DatePicker
  - event_bindings: {pressed_enter: btn_Search_click}
