  layout_properties: {grid_position: 'XYWEIJ,IBIVEX', row_background: ''}
  name: card_1
  properties: {col_widths: '{"SJOBFD":40}', role: glass-panel}
  type: ColumnPanel
- components:
  - layout_properties: {grid_position: 'TWQIGR,OOMKCH'}
    name: label_1
    properties: {align: center, background: 'theme:White', border: solid, foreground: '#dc1818', text: Only jobcards that have both quotes and invoices are displayed.}
    type: Label
  - components:
    - name: repeating_panel_1
      properties: {item_template: PeriodicQuoteVsInvoice.RowTemplate15}
      type: RepeatingPanel
    layout_properties: {full_width_row: true, grid_position: 'AOYKDK,TZLEBV'}
    name: data_grid_1
