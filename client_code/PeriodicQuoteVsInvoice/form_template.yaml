      background: theme:Black
      border: solid
      columns:
      - {data_key: 'No', expand: true, id: CCGWTX, title: 'No', width: ''}
      - {data_key: ReceivedDate, expand: true, id: JKSDUP, title: Received Date, width: ''}
      - {data_key: JobCardRef, expand: true, id: VJQQOR, title: Job Card Ref}
      - {data_key: QuotationTotal, expand: true, id: OJLQEN, title: Quotation Total}
      - {data_key: InvoiceTotal, expand: true, id: SVVCAY, title: Invoice Total}
