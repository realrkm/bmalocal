components:
- components:
  - components:
    - layout_properties: {grid_position: 'CHMDKK,MAFCQP'}
      name: label_1
      properties: {align: center, background: '#0056D6', font: Mozilla Headline, font_size: 20, foreground: 'theme:White', text: Service Appointment Booking}
      type: Label
    - event_bindings: {pressed_enter: btn_SearchCustomer_click}
      layout_properties: {grid_position: 'FGGFSN,GABUYK'}
      name: txt_ClientName
      properties: {background: 'theme:White', border: solid, font: Mozilla Headline, font_size: 16, foreground: 'theme:Black', placeholder: Enter Customer Name, visible: true}
      type: TextBox
    - event_bindings: {click: btn_SearchCustomer_click}
      layout_properties: {grid_position: 'FGGFSN,GOWPIC'}
      name: btn_SearchCustomer
      properties: {align: full, background: '#0056D6', font: Mozilla Headline, font_size: 16, foreground: 'theme:White', text: SEARCH, visible: true}
      type: Button
    - event_bindings: {change: drop_down_selectCustomer_change}
      layout_properties: {grid_position: 'ARWGEZ,FLSNIM'}
      name: drop_down_selectCustomer
      properties: {background: 'theme:White', border: solid, font: Mozilla Headline, font_size: 16, foreground: 'theme:Black', include_placeholder: true, placeholder: Select Customer *, visible: true}
      type: DropDown
    - layout_properties: {grid_position: 'CRLMDG,FOLVMX'}
      name: drop_down_car_reg
      properties: {background: 'theme:White', foreground: 'theme:Black', include_placeholder: true, placeholder: Select Vehicle RegNo *}
      type: DropDown
    - layout_properties: {grid_position: 'CRLMDG,HIWXJI'}
      name: date_picker_period
      properties: {background: 'theme:White', foreground: 'theme:Black', pick_time: true, placeholder: Select Date And Time *}
      type: DatePicker
    - layout_properties: {grid_position: 'DMGRDB,FJPDBW'}
      name: txt_area_details
      properties: {auto_expand: true, background: 'theme:White', border: solid, font: Mozilla Headline, font_size: 16, foreground: 'theme:Black', placeholder: Enter service details *}
      type: TextArea
    - event_bindings: {click: btn_Save_click}
      layout_properties: {full_width_row: false, grid_position: 'DRIQMO,XDVGXT'}
      name: btn_Save
      properties: {align: full, background: '#0056D6', font: Mozilla Headline1, font_size: 16, foreground: 'theme:White', text: SAVE}
      type: Button
    layout_properties: {full_width_row: false, grid_position: 'GDCEQW,CTCRMP'}
    name: card_2
    properties: {col_widths: '{"GABUYK":40,"GOWPIC":20}', role: glass-panel}
    type: ColumnPanel
  - layout_properties: {full_width_row: false, grid_position: 'YJEFEW,ZOBWAE'}
    name: label_2
    properties: {align: center, background: 'theme:White', font: Mozilla Headline, font_size: 16, foreground: '#ff0000', text: Only Current And Future Appointments Are Displayed}
    type: Label
  - components:
    - components:
      - name: repeating_panel_1
        properties: {item_template: Booking.RowTemplate24}
        type: RepeatingPanel
      layout_properties: {full_width_row: true, grid_position: 'PPEOCD,LRZUJS'}
      name: data_grid_1
      properties:
        background: theme:Black
        border: solid
        columns:
        - {data_key: 'No', expand: true, id: ORJKYJ, title: 'No', width: ''}
        - {data_key: Fullname, expand: true, id: JKSDUP, title: Client}
        - {data_key: Phone, expand: true, id: FBQCCA, title: Phone, width: ''}
        - {data_key: RegNo, expand: true, id: VJQQOR, title: RegNo}
        - {data_key: FormattedSchedule, expand: true, id: GNQKCR, title: Date And Time}
        - {data_key: Details, expand: true, id: OJLQEN, title: Details}
        - {data_key: ID, id: SAJOYS, title: '', width: '0.1'}
        - {data_key: '', id: BALGFU, title: Send Info, width: '90'}
        foreground: theme:White
        role: null
      type: DataGrid
    layout_properties: {full_width_row: true, grid_position: 'GMSFYC,OBBQHR'}
    name: card_3
    properties: {role: glass-panel}
    type: ColumnPanel
  layout_properties: {full_width_row: true, grid_position: 'ZJVONF,GUMGUK'}
  name: card_1
  properties: {role: null}
  type: ColumnPanel
container: {type: ColumnPanel}
is_package: true
