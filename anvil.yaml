name: BMALocal
native_deps:
  head_html: |+
    <script>
        function replaceBanner(){
            var els = [].slice.apply(document.getElementsByClassName("anvil-show-banner"));
            for (var i = 0; i < els.length; i++) {
                els[i].className = els[i].className.replace(/ *\banvil-show-banner\b/g, " ");
            }
        }
    </script>
    <script>
        (function () {
            "use strict";

            const MODEL   = "gemini-2.0-flash-live";
            const WS_BASE = "wss://generativelanguage.googleapis.com/ws/" +
                "google.ai.generativelanguage.v1beta." +
                "GenerativeService.BidiGenerateContent";

            const INPUT_SAMPLE_RATE  = 16000;
            const OUTPUT_SAMPLE_RATE = 24000;

            let ws             = null;
            let audioCtx       = null;
            let micStream      = null;
            let processorNode  = null;
            let apiKey         = "";
            let isConnected    = false;
            let nextPlayTime   = 0;
            let setupTimeout   = null;

            function float32ToBase64PCM(float32Array) {
                const int16 = new Int16Array(float32Array.length);
                for (let i = 0; i < float32Array.length; i++) {
                    int16[i] = Math.max(-32768, Math.min(32767, float32Array[i] * 32767));
                }
                let binary = "";
                const bytes = new Uint8Array(int16.buffer);
                for (let i = 0; i < bytes.byteLength; i++) {
                    binary += String.fromCharCode(bytes[i]);
                }
                return btoa(binary);
            }

            function base64PCMToFloat32(b64) {
                const binary = atob(b64);
                const bytes  = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                const int16  = new Int16Array(bytes.buffer);
                const f32    = new Float32Array(int16.length);
                for (let i = 0; i < int16.length; i++) f32[i] = int16[i] / 32768.0;
                return f32;
            }

            function notifyAnvil(event, data) {
                try {
                    if (window.live_assistant_event) {
                        window.live_assistant_event(event, JSON.stringify(data));
                    }
                } catch (err) {
                    console.error("[GeminiLive] notifyAnvil failed:", err);
                }
            }

            function ensureAudioContext() {
                if (!audioCtx || audioCtx.state === "closed") {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: OUTPUT_SAMPLE_RATE });
                }
                if (audioCtx.state === "suspended") audioCtx.resume();
            }

            function scheduleAudioChunk(f32Data) {
                ensureAudioContext();
                const buffer = audioCtx.createBuffer(1, f32Data.length, OUTPUT_SAMPLE_RATE);
                buffer.copyToChannel(f32Data, 0);
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(audioCtx.destination);
                const now = audioCtx.currentTime;
                if (nextPlayTime < now) nextPlayTime = now + 0.05;
                source.start(nextPlayTime);
                nextPlayTime += buffer.duration;
            }

            async function startMic() {
            micStream = await navigator.mediaDevices.getUserMedia({
            audio: { sampleRate: INPUT_SAMPLE_RATE, channelCount: 1, echoCancellation: true, noiseSuppression: true }
        });
            ensureAudioContext();
            const micCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: INPUT_SAMPLE_RATE });
            const source = micCtx.createMediaStreamSource(micStream);
            processorNode = micCtx.createScriptProcessor(4096, 1, 1);
            processorNode.onaudioprocess = (e) => {
            if (!isConnected || !ws || ws.readyState !== WebSocket.OPEN) return;
            const pcmB64 = float32ToBase64PCM(e.inputBuffer.getChannelData(0));
            ws.send(JSON.stringify({
            realtimeInput: { mediaChunks: [{ mimeType: "audio/pcm", data: pcmB64 }] }
        }));
        };
            source.connect(processorNode);
            processorNode.connect(micCtx.destination);
        }

            function connect() {
            if (isConnected) return;
            const url = `${WS_BASE}?key=${apiKey}`;
            ws = new WebSocket(url);
            notifyAnvil("status", { text: "Connecting..." });

            setupTimeout = setTimeout(() => {
            if (!isConnected) {
            disconnect();
            notifyAnvil("error", { message: "Connection timeout" });
        }
        }, 10000);

            ws.onopen = () => {
            ws.send(JSON.stringify({
            setup: {
            model: `models/${MODEL}`,
            generationConfig: {
            responseModalities: ["AUDIO", "TEXT"],
            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Aoede" } } }
        },
            systemInstruction: {
            parts: [{
            text: "You are a professional assistant for BMA Auto Accessories (BMW, Mercedes, Audi experts). " +
            "Answer questions about job cards, inventory, and invoices concisely. " +
            "SAFETY RULE: If asked for technical torque specs, fluid capacities, or safety-critical data, " +
            "and you are not 100% certain, advise the user to consult the official workshop manual. Do not guess."
        }]
        },
            /* Add Tool Declarations here in next phase */
            tools: [{ functionDeclarations: [] }]
        }
        }));
        };

            ws.onmessage = async (event) => {
            let raw = event.data;
            if (raw instanceof Blob) raw = await raw.text();
            let msg = JSON.parse(raw);

            if (msg.setupComplete) {
            if (setupTimeout) clearTimeout(setupTimeout);
            isConnected = true;
            notifyAnvil("connected", {});
            startMic().catch(e => notifyAnvil("error", { message: e.message }));
        }

            if (msg.serverContent) {
            const sc = msg.serverContent;
            const parts = sc.modelTurn?.parts || [];
            for (const part of parts) {
            if (part.inlineData?.data) scheduleAudioChunk(base64PCMToFloat32(part.inlineData.data));
            if (part.text) notifyAnvil("transcript", { text: part.text });
        }
            if (sc.turnComplete) notifyAnvil("status", { text: "🟢 Listening" });
        }
        };

            ws.onclose = () => {
            isConnected = false;
            notifyAnvil("disconnected", {});
        };
        }

            function disconnect() {
            if (ws) ws.close();
            if (micStream) micStream.getTracks().forEach(t => t.stop());
            isConnected = false;
        }

            window.GeminiLive = {
            setApiKey: (key) => { apiKey = key; },
            connect: connect,
            disconnect: disconnect,
            sendText: (text) => {
            if (isConnected && ws) ws.send(JSON.stringify({ clientContent: { turns: [{ role: "user", parts: [{ text }] }], turnComplete: true } }));
        }
        };
        })();
            </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mozilla+Headline:wght@200..700&display=swap" rel="stylesheet">

