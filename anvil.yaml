name: BMALocal
native_deps:
  head_html: "<script>\n    function replaceBanner(){\n        var els = [].slice.apply(document.getElementsByClassName(\"anvil-show-banner\"));\n        for (var i = 0; i < els.length; i++) {\n            els[i].className = els[i].className.replace(/ *\\banvil-show-banner\\b/g, \" \");\n        }\n    }\n</script>\n<script>\n    (function () {\n        \"use strict\";\n\n        const OLLAMA_URL = \"http://127.0.0.1:11434/api/chat\";\n        const MODEL = \"gemma4:e2b\";\n\n        let isBusy = false;\n        let isListening = false;\n\n        // ─── Speech Recognition Setup ───────────────────────\n        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;\n        const recognition = SpeechRecognition ? new SpeechRecognition() : null;\n\n        if (recognition) {\n            recognition.continuous = false;\n            recognition.lang = 'en-US';\n            recognition.interimResults = false;\n\n            // Triggered when the microphone successfully starts\n            recognition.onstart = () => {\n                isListening = true;\n                notifyAnvil(\"status\", { text: \"🟢 Listening...\" });\n                notifyAnvil(\"volume\", { level: 0.7 }); // Visual feedback\n            };\n\n            // Triggered when speech is converted to text\n            recognition.onresult = (event) => {\n                const transcript = event.results[0][0].transcript;\n                notifyAnvil(\"transcript\", { text: `You: ${transcript}` });\n\n                // CRITICAL: Explicitly set status to thinking before calling the API\n                notifyAnvil(\"status\", { text: \"Gemma is thinking...\" });\n                notifyAnvil(\"volume\", { level: 0 }); // Silence volume bar while thinking\n\n                window.GeminiLive.sendText(transcript);\n            };\n\n            // Triggered when the user stops speaking\n            recognition.onend = () => {\n                isListening = false;\n                // Note: We don't set \"Disconnected\" here because askGemma \n                // will update the status once the AI response arrives.\n            };\n\n            recognition.onerror = (event) => {\n                console.error(\"Speech Error:\", event.error);\n                notifyAnvil(\"status\", { text: \"Mic Error: \" + event.error });\n                notifyAnvil(\"volume\", { level: 0 });\n            };\n        }\n\n        // ─── Anvil Communication ────────────────────────────\n        async function notifyAnvil(event, data) {\n            try {\n                if (window.live_assistant_event) {\n                    window.live_assistant_event(event, JSON.stringify(data));\n                }\n            } catch (err) {\n                console.error(\"[GemmaLocal] notifyAnvil failed:\", err);\n            }\n        }\n\n        // ─── Gemma Logic ────────────────────────────────────\n        async function askGemma(userText) {\n            if (isBusy) return;\n            isBusy = true;\n\n            try {\n                const response = await fetch(OLLAMA_URL, {\n                    method: 'POST',\n                    headers: { 'Content-Type': 'application/json' },\n                    body: JSON.stringify({\n                        model: MODEL,\n                        messages: [\n                            {\n                                role: \"system\",\n                                content: \"You are a professional assistant for BMA Auto Accessories. Be extremely concise and helpful.\"\n                            },\n                            {\n                                role: \"user\",\n                                content: userText\n                            }\n                        ],\n                        stream: false\n                    })\n                });\n\n                const data = await response.json();\n                const aiResponse = data.message.content;\n\n                notifyAnvil(\"transcript\", { text: `Gemma: ${aiResponse}` });\n                notifyAnvil(\"status\", { text: \"🟢 Local - Ready\" });\n\n                speakText(aiResponse);\n\n            } catch (error) {\n                console.error(\"Ollama Error:\", error);\n                notifyAnvil(\"status\", { text: \"🔴 Error: Check Ollama/CORS\" });\n                notifyAnvil(\"error\", { message: \"Check if Ollama is running with OLLAMA_ORIGINS.\" });\n            } finally {\n                isBusy = false;\n            }\n            }\n\n                function speakText(text) {\n                const utterance = new SpeechSynthesisUtterance(text);\n                const voices = window.speechSynthesis.getVoices();\n                utterance.voice = voices.find(v => v.name.includes(\"Google\") || v.name.includes(\"Premium\")) || voices[0];\n                window.speechSynthesis.speak(utterance);\n            }\n\n                // ─── Global Controller ───────────────────────────────\n                window.GeminiLive = {\n                connect: () => {\n                if (!recognition) {\n                notifyAnvil(\"error\", { message: \"Speech recognition not supported.\" });\n                return;\n            }\n\n                if (!isListening && !isBusy) {\n                try {\n                recognition.start();\n                notifyAnvil(\"connected\", {});\n            } catch (e) {\n                console.error(\"Recognition start error:\", e);\n            }\n            }\n            },\n                disconnect: () => {\n                if (recognition && isListening) {\n                recognition.stop();\n            }\n                notifyAnvil(\"disconnected\", {});\n                notifyAnvil(\"status\", { text: \"⚪ Disconnected\" });\n                notifyAnvil(\"volume\", { level: 0 });\n            },\n                sendText: (text) => {\n                askGemma(text);\n            }\n            };\n})();\n</script>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Mozilla+Headline:wght@200..700&display=swap\" rel=\"stylesheet\">\n\n"
